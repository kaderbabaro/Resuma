<svg width="300" height="350" viewBox="0 0 300 350" xmlns="http://www.w3.org/2000/svg">

    <!-- Fond noir -->
    <rect width="100%" height="100%" fill="black"/>

    <!-- Contour carré arrondi -->
    <rect
        x="50"
        y="40"
        width="200"
        height="200"
        rx="35"
        ry="35"
        fill="none"
        stroke="white"
        stroke-width="4"
    />

    <!-- Lignes du document -->
    <g stroke="white" stroke-width="4" stroke-linecap="round">

        <line x1="90" y1="90" x2="150" y2="90"/>
        <line x1="90" y1="115" x2="180" y2="115"/>
        <line x1="90" y1="140" x2="200" y2="140"/>
        <line x1="90" y1="165" x2="210" y2="165"/>
        <line x1="90" y1="190" x2="170" y2="190"/>

    </g>

    <!-- Point violet lumineux -->
    <defs>
        <radialGradient
            id="purpleGlow"
            gradientUnits="userSpaceOnUse"
            cx="215"
            cy="125"
            r="25"
        >
            <stop offset="0%" stop-color="#B65CFF"/>
            <stop offset="100%" stop-color="#B65CFF" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <circle cx="215" cy="125" r="18" fill="url(#purpleGlow)"/>
    <circle cx="215" cy="125" r="6" fill="#B65CFF"/>

    <!-- Texte Resuma -->
    <text
        x="150"
        y="300"
        text-anchor="middle"
        fill="white"
        font-size="42"
        font-weight="bold"
        font-family="Arial, Helvetica, sans-serif"
    >
        Resuma
    </text>

</svg>
